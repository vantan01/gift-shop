services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gift_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor   
    depends_on:
      - postgres
    networks:
      - frontend_net
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: gift_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  postgres:
    image: postgres:16-alpine
    container_name: gift_shop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gift_shop
      POSTGRES_USER: gift_shop_user
      POSTGRES_PASSWORD: secret123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  postgres_data:

networks:
  frontend_net:
  backend_net:
  